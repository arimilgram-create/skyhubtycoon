<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyHub Tycoon</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand__icon">✈</span>
          <div>
            <h1>SkyHub Tycoon</h1>
            <p>Grid airport builder · Cozy 2/3 isometric management</p>
          </div>
        </div>
        <div class="hud" aria-label="Airport statistics">
          <div class="hud-card"><span>Money</span><strong id="money">$85,000</strong></div>
          <div class="hud-card"><span>Satisfaction</span><strong id="satisfaction">82%</strong></div>
          <div class="hud-card"><span>Reputation</span><strong id="reputation">★ 1.3</strong></div>
          <div class="hud-card"><span>Flights</span><strong id="flightCount">0 / 3</strong></div>
        </div>
      </header>

      <main class="game-layout">
        <aside class="panel build-panel" aria-label="Build menu">
          <div class="panel__header">
            <h2>Build</h2>
            <button id="bulldozeBtn" class="ghost-button" type="button">Bulldoze</button>
          </div>
          <div id="buildMenu" class="build-menu"></div>
        </aside>

        <section class="viewport-card">
          <div class="viewport-toolbar">
            <div class="tool-readout">
              <strong id="selectedToolName">Public floor</strong>
              <span id="placementHint">Paint terminal foundations on unlocked land.</span>
            </div>
            <div class="toolbar-actions">
              <button id="rotateBtn" type="button">Rotate 90°</button>
              <button id="roofBtn" type="button">Roofs: Off</button>
              <button id="wallBtn" type="button">Cutaway: On</button>
              <button id="gridBtn" type="button">Grid: On</button>
            </div>
          </div>

          <div id="viewport" class="viewport" tabindex="0" aria-label="Airport build viewport">
            <div id="camera" class="camera camera--iso">
              <div id="world" class="world" aria-live="polite"></div>
            </div>
          </div>

          <div class="bottom-dock">
            <div class="schedule-card">
              <h3>Flight Schedule</h3>
              <div id="scheduleList" class="schedule-list"></div>
              <button id="scheduleBtn" class="primary-button" type="button">Schedule next flight</button>
            </div>
            <div class="progress-card">
              <h3>Progression</h3>
              <ol id="missionList"></ol>
            </div>
          </div>
        </section>

        <aside class="panel info-panel" aria-label="Airport status">
          <section>
            <h2>Alerts</h2>
            <div id="alerts" class="alerts"></div>
          </section>
          <section>
            <h2>Systems</h2>
            <div id="systems" class="systems"></div>
          </section>
          <section>
            <h2>Staff</h2>
            <div id="staffList" class="staff-list"></div>
            <button id="hireBtn" class="secondary-button" type="button">Hire staff</button>
          </section>
          <section>
            <h2>Unlocks</h2>
            <div id="unlockTree" class="unlock-tree"></div>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="src/game.js"></script>
  </body>
</html>
